server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    charset utf-8;

    # land on the prompt-pack page
    index fortnight-audit-prompt-pack.html;

    # browsers request /favicon.ico by default — serve the brand PNG there
    location = /favicon.ico {
        types {}
        default_type image/png;
        alias /usr/share/nginx/html/assets/brand/favicon.png;
    }

    # long-cache the immutable font files
    location ~* \.woff2$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # serve the master prompt as markdown (the page's Download button links to it)
    location ~* \.md$ {
        default_type "text/markdown; charset=utf-8";
    }
}
